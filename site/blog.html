          { type: 'p', text: 'If you run a business solo or with a tiny team, you already know the math doesn\u2019t work. You need the output of five people but the budget for one. You\u2019ve tried ChatGPT, tried Zapier, tried hiring freelancers \u2014 and you\u2019re still drowning in operational work that keeps you from doing what actually matters.' },
          { type: 'p', text: 'Today we\u2019re launching nexu \u2014 an open-source desktop client that puts an AI agent workforce directly inside the chat apps you already use: WeChat, Feishu, Slack, and Discord. No new tools to learn, no complex setup. Download, double-click, scan with your phone, and start chatting with your AI team.' },
          { type: 'h2', text: 'Skills: The Building Blocks of Your AI Team' },
          { type: 'p', text: 'What makes nexu different from a generic chatbot is Skills. Each Skill is a specialized capability your agent can perform \u2014 like generating multilingual product listings, reviewing a contract for risk clauses, or repurposing a blog post into five platform-specific social posts. Skills ship built-in with nexu, and new ones are added every week by our open-source community.' },
          { type: 'p', text: 'Think of Skills like hiring specialists. Instead of one generalist assistant that\u2019s mediocre at everything, you get a team of experts \u2014 each deeply capable at one specific task. And they all live inside your existing chat apps, ready whenever you need them.' },
          { type: 'h2', text: 'Why Chat Apps? Why Not Another Dashboard?' },
          { type: 'p', text: 'We built nexu around a simple observation: solo creators and small teams already live in their chat apps. WeChat in China, Feishu for teams, Slack and Discord internationally. Adding another SaaS dashboard means another tab, another login, another tool to check. nexu eliminates that friction entirely \u2014 your AI agent is just another contact in your chat list, available 24/7 from your phone.' },
          { type: 'h2', text: 'Top-Tier Models, Zero Extra Cost' },
          { type: 'p', text: 'During beta, nexu gives you unlimited access to Claude, GPT, Gemini, Kimi, GLM, and more \u2014 completely free. No API keys to configure, no usage caps to worry about. After beta, you can bring your own API keys and pay your model providers directly. No middleman markup, no subscription lock-in.' },
          { type: 'h2', text: 'Open Source, Local-First' },
          { type: 'p', text: 'nexu is MIT-licensed. All data stays on your machine \u2014 your business strategies, your client communications, your creative processes never touch our servers. Fork it, audit it, build on top of it. We believe the infrastructure layer for AI agents should be as open and trustworthy as the operating system on your computer.' },
          { type: 'h2', text: 'Get Started in Under 5 Minutes' },
          { type: 'p', text: 'Download nexu from nexu.io, double-click to install, and connect your first chat channel. Your AI team is ready. During beta, every model is free with unlimited usage \u2014 so there\u2019s genuinely nothing to lose except the hours you\u2019re currently spending on work your agent could handle.' },
          { type: 'p', text: 'Want to learn more? Read our <a class="blog-link" href="#ai-agent-skills-guide">complete guide to AI Agent Skills</a>, or see how <a class="blog-link" href="#cross-border-ecommerce-ai">solo e-commerce sellers automate 3 marketplaces</a>.' }
        ],

          { type: 'h2', text: '\u9876\u7ea7\u6a21\u578b\uff0c\u96f6\u989d\u5916\u6210\u672c' },
          { type: 'p', text: 'Beta \u671f\u95f4\uff0cnexu \u514d\u8d39\u63d0\u4f9b Claude\u3001GPT\u3001Gemini\u3001Kimi\u3001GLM \u7b49\u6a21\u578b\u7684\u65e0\u9650\u4f7f\u7528\u3002\u4e0d\u7528\u914d\u7f6e API Key\uff0c\u4e0d\u7528\u62c5\u5fc3\u7528\u91cf\u4e0a\u9650\u3002Beta \u7ed3\u675f\u540e\uff0c\u4f60\u53ef\u4ee5\u81ea\u5e26 API Key\uff0c\u76f4\u63a5\u5411\u6a21\u578b\u4f9b\u5e94\u5546\u4ed8\u8d39\u3002\u6ca1\u6709\u4e2d\u95f4\u5546\u52a0\u4ef7\uff0c\u6ca1\u6709\u8ba2\u9605\u7ed1\u5b9a\u3002' },

      {
        id: 'ann-vision',
        category: 'Announcements',
        slug: 'one-person-company-ai-team',
        title: 'One Person Company: How AI Agents Replace a 5-Person Team',
        title_zh: '\u4e00\u4eba\u516c\u53f8\uff1aAI Agent \u5982\u4f55\u5b9e\u73b0 5 \u4eba\u56e2\u961f\u7684\u4ea7\u51fa',
        desc: 'The One Person Company is rising \u2014 solo founders producing team-level output with AI agents and Skills. Here\u2019s our vision for making that real.',
        desc_zh: '\u4e00\u4eba\u516c\u53f8\u6b63\u5728\u5d1b\u8d77\u2014\u2014\u72ec\u7acb\u521b\u4e1a\u8005\u501f\u52a9 AI Agent \u548c Skills \u5b9e\u73b0\u56e2\u961f\u7ea7\u4ea7\u51fa\u3002\u8fd9\u662f\u6211\u4eec\u7684\u613f\u666f\u3002',
        date: "MAR '26",
        date_zh: '2026\u5e743\u6708',
        team: 'FOUNDING TEAM',
        team_zh: '\u521b\u59cb\u56e2\u961f',
        label: 'March 2026',
        label_zh: '2026\u5e743\u6708',
        bg: 'url(img/blog-vision.png) center/cover no-repeat',
        related: ['featured', 'guide-pillar', 'guide-tools'],
        sections: [
          { type: 'p', text: 'Something fundamental is shifting in how people work. Across every industry, we\u2019re seeing the rise of what we call the One Person Company \u2014 individuals or tiny teams that produce the output of organizations ten times their size. A solo e-commerce seller managing three international marketplaces. A content creator running a five-platform media operation. A freelance lawyer handling the caseload of a small firm.' },
          { type: 'p', text: 'These people don\u2019t need another productivity tool. They need team members \u2014 reliable ones who show up on time, never forget a step, and work while they sleep. That\u2019s what nexu is.' },
          { type: 'h2', text: 'AI Agents Should Live Where You Already Work' },
          { type: 'p', text: 'Most AI tools ask you to change your behavior \u2014 open a new app, learn a new interface, adopt a new workflow. We think that\u2019s backwards. Your agent should meet you where you are. If you live in WeChat, your agent should be a WeChat contact. If your team uses Feishu, your agent should be a Feishu bot. That\u2019s why nexu connects directly to the IM channels you already use, instead of building yet another dashboard you\u2019ll forget to check.' },
          { type: 'h2', text: 'Skills, Not Prompts' },
          { type: 'p', text: 'The biggest limitation of current AI tools is that you have to tell them what to do every single time. Write the prompt, get the output, repeat. Skills change this entirely. A Skill is a reusable, specialized capability \u2014 once configured, your agent can execute it consistently, on its own, whenever triggered. It\u2019s the difference between giving someone instructions every morning and having a trained team member who already knows the job.' },
          { type: 'h2', text: 'Open Source Because Trust Matters' },
          { type: 'p', text: 'When an AI agent has access to your business data, your client communications, and your financial information, trust isn\u2019t optional. That\u2019s why nexu is MIT-licensed and local-first. Your data never leaves your machine. You can read every line of code that handles your information. And because it\u2019s open source, the community can contribute Skills, audit security, and build on top of the platform.' },
          { type: 'h2', text: 'What\u2019s Next' },
          { type: 'p', text: 'We\u2019re expanding platform support beyond macOS, building a Skill marketplace where creators can share and monetize their Skills, and deepening integrations with business tools like Notion, Google Workspace, and Shopify. If you believe one person should be able to do the work of ten, we\u2019d love to have you along for the journey. Download nexu, join our GitHub community, and help us build the future of the One Person Company.' },
          { type: 'p', text: 'Curious about Skills? Read our <a class="blog-link" href="#ai-agent-skills-guide">complete guide to AI Agent Skills</a>, or see <a class="blog-link" href="#best-ai-agent-tools-2026">how nexu compares to other AI tools</a>.' }
        ],

          { type: 'p', text: 'ChatGPT lives in a browser tab. You go to it when you need help. Zapier lives in a dashboard \u2014 you build automations, then forget about them until something breaks. nexu lives in your chat app \u2014 WeChat, Feishu, Slack, or Discord \u2014 the same place you already spend your work day. This matters because the tool you check 50 times a day will get used. The one behind another login won\u2019t.' },
          { type: 'h2', text: 'What They Can Do' },
          { type: 'p', text: 'ChatGPT excels at generating text, answering questions, and analyzing documents \u2014 but every task is a blank-slate conversation. Zapier excels at connecting apps \u2014 when a form is submitted, create a row in a spreadsheet and send an email \u2014 but it follows rules, not judgment. nexu combines AI intelligence with workflow automation through <a class="blog-link" href="#ai-agent-skills-guide">Skills</a> \u2014 reusable capabilities that execute complex, multi-step tasks with built-in domain knowledge.' },
          { type: 'h2', text: 'Setup and Learning Curve' },
          { type: 'p', text: 'ChatGPT: zero setup, type and go. But getting consistent, production-quality output requires careful prompt engineering every time. Zapier: moderate setup, drag-and-drop workflow builder. nexu: download, scan QR code, activate Skills. Under 5 minutes to first useful output, and Skills handle the prompt engineering for you.' },
          { type: 'h2', text: 'Cost Structure' },
          { type: 'p', text: 'ChatGPT: $20/month for Plus, $200/month for Team. Zapier: free for 100 tasks/month, $19.99+ for more. nexu: free during beta (all models, unlimited usage), post-beta BYOK model with no markup. For a solo business running 1,000+ automated tasks per month, Zapier costs add up fast. nexu\u2019s BYOK approach means you pay model providers directly at wholesale rates.' },
          { type: 'h2', text: 'Data Privacy' },
          { type: 'p', text: 'ChatGPT: your data passes through OpenAI\u2019s servers. Zapier: data passes through Zapier\u2019s cloud infrastructure. nexu: fully local-first. All data stays on your machine. Open-source code means you can audit exactly what happens with your information. For solopreneurs handling client contracts, financial data, or creative IP, this isn\u2019t a nice-to-have \u2014 it\u2019s a requirement.' },
          { type: 'h2', text: 'When to Use Which' },
          { type: 'p', text: 'Use ChatGPT when you need a quick answer or a one-off writing task. Use Zapier when you need simple, rule-based connections between apps. Use nexu when you need an AI team member that handles complex, recurring workflows in your chat app \u2014 especially for content, e-commerce, legal, or development tasks.' },
          { type: 'h2', text: 'Can You Use Them Together?' },
          { type: 'p', text: 'Yes \u2014 and that\u2019s often the smartest approach. Use nexu as your primary AI agent for complex workflows handled through Skills. Use Zapier for simple data plumbing between apps. Use ChatGPT or Claude for ad-hoc research. The key is matching each tool to its strength. <a class="blog-link" href="#setup-ai-agent-wechat">Get started with nexu in 5 minutes</a>.' }
        ],

        sections: [
          { type: 'p', text: '\u201CMonday morning: I ask my Agent in Slack for this week\u2019s trending topics. By lunch, I have 5 draft posts across Xiaohongshu, WeChat, and Twitter \u2014 each in the right tone for the platform.\u201D' },
          { type: 'p', text: 'If you\u2019re a content creator in 2026, you\u2019re not just a writer or a filmmaker. You\u2019re a one-person media company running across five or more platforms simultaneously. And the dirty secret of content creation is that the actual creative work \u2014 the writing, the filming, the thinking \u2014 only takes about 40% of your time. The other 60% is operational: reformatting, scheduling, cross-posting, tracking analytics, and responding to comments.' },
          { type: 'h2', text: 'The Repurposing Trap' },
          { type: 'p', text: 'The biggest time sink isn\u2019t creating original content. It\u2019s adapting that content for each platform. A long-form blog post needs to become a Twitter thread, a Xiaohongshu carousel, a WeChat article, a LinkedIn post, and a newsletter segment. Each platform has different character limits, different visual formats, different audience expectations. Most creators either spend hours doing this manually or just skip platforms entirely \u2014 leaving reach on the table.' },
          { type: 'h2', text: 'Three Skills for the Content Matrix' },
          { type: 'p', text: 'Content Repurposing Skill: Write once, publish everywhere. Feed your agent an original blog post or video transcript, and it produces platform-native versions for each of your channels. Not generic summaries \u2014 each output matches the specific tone, format, and length that performs best on that platform. Xiaohongshu gets an emoji-rich carousel outline. Twitter gets a punchy thread. WeChat gets a structured long-form piece.' },
          { type: 'p', text: 'Topic Radar Skill: Every Monday morning, your agent scans trending topics across your niche, analyzes what\u2019s gaining traction, and pushes a curated list of content ideas to your WeChat. Each suggestion comes with a relevance score and an angle that aligns with your existing content strategy. No more doom-scrolling for inspiration.' },
          { type: 'p', text: 'Engagement Filter Skill: When you\u2019re getting hundreds of comments across platforms, it\u2019s impossible to read every one. This Skill scans your comments and DMs, surfaces the high-value interactions \u2014 potential collaborations, constructive feedback, brand inquiries \u2014 and drafts reply suggestions. You review and send, instead of starting from scratch.' },
          { type: 'h2', text: 'Before and After' },
          { type: 'p', text: 'Before nexu: 15+ hours per week on content ops, posting consistently on 2\u20133 platforms at most, missing trends because research takes too long, high-value comments buried in noise. After nexu: 4 hours per week reviewing and approving agent output, consistent publishing across 5 platforms, weekly trend briefings delivered to your phone, only meaningful interactions reach your attention.' },
          { type: 'h2', text: 'Start From Your Phone' },
          { type: 'p', text: 'Your agent lives in WeChat or Slack \u2014 the same chat apps you already check 50 times a day. Tag it with your request, and results appear in the same conversation. <a class="blog-link" href="#setup-ai-agent-wechat">Set up nexu in 5 minutes</a> and activate the Creator Skill pack. Your AI content team is a message away.' }

        sections: [
          { type: 'p', text: '\u201C3 AM bug hunt? I paste the stack trace into Discord, my Agent traces it to a race condition, suggests a fix, and even drafts the PR description. Pair programming that never sleeps.\u201D' },
          { type: 'p', text: 'Being an indie developer means you\u2019re the entire engineering team. You write the code, review the code, debug the code, write the docs, manage the CI pipeline, and handle support tickets \u2014 all before lunch. The freedom is incredible. The context-switching tax is brutal.' },
          { type: 'img', src: 'img/ss-chat-intro.png', alt: 'AI agent intro conversation for developers' },
          { type: 'h2', text: 'Where Solo Developers Lose Time' },
          { type: 'p', text: 'We talked to 150+ indie developers about their weekly workflow. The pattern is clear: roughly 30% of coding time goes to debugging alone \u2014 staring at stack traces, adding console.log statements, and searching Stack Overflow for error messages that return zero useful results. Another 20% goes to documentation nobody wants to write. That\u2019s half your productive time lost to tasks that are important but tedious.' },
          { type: 'h2', text: 'Three Skills for the Solo Dev Stack' },
          { type: 'p', text: 'Bug Hunter Skill: Paste a stack trace or error message into Discord or Slack. Your agent analyzes the error, traces it through your codebase context, identifies probable root causes, and suggests a fix with code. For common patterns like race conditions, null reference errors, or configuration mismatches, it often nails the diagnosis in under 30 seconds.' },
          { type: 'img', src: 'img/ss-chat-debug.png', alt: 'AI debugging in Discord' },
          { type: 'p', text: 'Doc Writer Skill: Push code to a branch, and your agent automatically generates the PR description, updates the relevant README sections, and drafts a changelog entry. It reads your existing doc style and matches the tone. No more \u201Cupdate docs\u201D items languishing in your backlog for weeks.' },
          { type: 'img', src: 'img/ss-chat-pr.png', alt: 'AI-generated PR description' },
          { type: 'p', text: 'Code Scaffold Skill: Describe what you need in plain language \u2014 \u201Ca REST API endpoint for user registration with email verification\u201D \u2014 and your agent generates the boilerplate code, database migration, and corresponding test file. It follows the conventions already present in your project.' },

          { type: 'p', text: '\u201CA client sends a 40-page contract on Feishu. I forward it to my Agent \u2014 10 minutes later I get a risk summary, flagged clauses, and suggested revisions. What used to take half a day now takes a coffee break.\u201D' },
          { type: 'p', text: 'Legal work is built on expertise, not speed. But the reality of modern legal practice \u2014 especially for solo practitioners and small firms \u2014 is that expertise gets buried under operational overhead. Reading 40-page contracts cover to cover. Searching for relevant regulations across multiple databases. Answering the same client questions you\u2019ve answered a hundred times before. The work is important, but it doesn\u2019t require the full weight of your legal judgment at every step.' },
          { type: 'h2', text: 'The Document Review Bottleneck' },
          { type: 'p', text: 'A typical contract review at a solo practice follows a predictable pattern: 3\u20134 hours reading through the document, marking potential issues, cross-referencing against standard clauses, drafting a risk summary, and writing revision suggestions. For a busy lawyer juggling 15+ active matters, this means contract reviews stack up, turnaround times stretch, and clients wait.' },
          { type: 'h2', text: 'Three Skills for Legal Professionals' },
          { type: 'p', text: 'Contract Review Skill: Forward a contract document to your agent in Feishu. Within 10 minutes, you receive a structured risk summary \u2014 flagged clauses ranked by severity, comparison against standard market terms, and specific revision language you can use. Your agent doesn\u2019t replace your judgment; it does the 3 hours of reading so you can spend 20 minutes applying your expertise.' },
          { type: 'p', text: 'Regulation Lookup Skill: Describe a scenario in natural language \u2014 \u201Cclient wants to include a non-compete clause for a contractor in California\u201D \u2014 and your agent retrieves relevant statutes, recent case law, and regulatory guidance. It cites sources, flags jurisdictional nuances, and notes any recent changes in enforcement trends.' },
          { type: 'p', text: 'Client FAQ Skill: Over time, 80% of client questions repeat. This Skill builds a knowledge base from your previous responses and generates accurate, consistent answers in your tone and style. You review, personalize, and send.' },

          { type: 'p', text: 'Before nexu: 3\u20134 hours per contract review, regulation research scattered across multiple databases, identical client questions answered from scratch each time. After nexu: 20 minutes per contract review (10 min agent analysis + 10 min expert judgment), regulation research consolidated in seconds, client FAQ responses pre-drafted.' },
          { type: 'h2', text: 'Privacy by Design' },
          { type: 'p', text: 'Legal professionals handle some of the most sensitive data in any profession. nexu is local-first: your contracts and client details never leave your machine. The client is open-source and MIT-licensed. <a class="blog-link" href="#setup-ai-agent-wechat">Download nexu</a> and forward your next contract to your agent. Learn more about how <a class="blog-link" href="#ai-agent-skills-guide">Skills work</a>.' }

    getRelated() { const cur = this.getCurrent(); if (cur && cur.related) return cur.related.map(id => this.articles.find(a => a.id === id)).filter(Boolean); return this.articles.filter(a => a.id !== this.openArticle).slice(0, 3); }

                  <h2 x-show="block.type === 'h2'" class="t-20" style="margin-top:20px;margin-bottom:4px;" x-text="block.text"></h2>
                  <p x-show="block.type === 'p'" class="t-16" style="color:rgba(255,255,255,0.7);margin-bottom:20px;" x-html="block.text"></p>
                  <img x-show="block.type === 'img'" :src="block.src" :alt="block.alt || ''" style="width:100%;border-radius:12px;margin-bottom:24px;display:block;" loading="lazy">
                </div>
              </template>
            </div>
          </template>
        </div>

        <div style="margin-top:80px;padding-top:40px;border-top:1px solid rgba(255,255,255,0.1);">
          <div class="t-12" style="color:rgba(255,255,255,0.4);margin-bottom:24px;" x-text="lang === 'zh' ? '\u66f4\u591a\u6765\u81ea NEXU' : 'MORE FROM NEXU'"></div>
          <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;">
            <template x-for="a in getRelated()" :key="a.id">
              <div class="group cursor-pointer" @click="openArticle = a.id; location.hash = a.slug; window.scrollTo(0,0)">
                <div :style="'aspect-ratio:16/9;border-radius:10px;overflow:hidden;margin-bottom:12px;background:' + a.bg"></div>
                <p class="t-14 font-medium group-hover:opacity-70 transition-opacity" x-text="t(a, 'title')"></p>
              </div>
            </template>
          </div>
        </div>
      </div>
    </div>
  </main>

</body>
</html>
