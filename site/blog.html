          { type: 'p', text: 'nexu is built for <strong>One Person Company</strong> and small teams — one person, one AI team.' },

        sections: [
          { type: 'h2', text: '✨ New Features' },
          { type: 'p', text: '<strong>Skill import modal:</strong> Import Skill dialog with zip upload support and bilingual UI. (#355)' },
          { type: 'p', text: '<strong>Markdown chat rendering:</strong> Session chat bubbles now render formatted content — lists, links, code blocks. (#348)' },
          { type: 'p', text: '<strong>Dynamic runtime ports:</strong> Desktop runtime allocates ports dynamically, eliminating fixed-port conflicts on startup. (#331)' },
          { type: 'p', text: '<strong>About dialog & update menu:</strong> Added app About dialog and in-app update check actions. (#345)' },
          { type: 'p', text: '<strong>Workspace & runtime analytics:</strong> Added analytics events for workspace and runtime lifecycle tracking. (#411)' },
          { type: 'h2', text: '🐛 Bug Fixes' },
          { type: 'p', text: '<strong>Fix Feishu restart loop:</strong> Config writer now skips redundant writes, breaking the restart → syncAll → write → watcher cycle that made Feishu channels unusable. (#347)' },
          { type: 'p', text: '<strong>Fix zombie processes on quit:</strong> App quit now awaits child process cleanup and escalates to SIGKILL after 3s, preventing orphaned processes that block app deletion. (#346)' },
          { type: 'p', text: '<strong>Fix cold-start config reload:</strong> Config writer seeds its cache from disk on startup, avoiding unnecessary OpenClaw reloads after every controller restart. (#349)' },
          { type: 'p', text: '<strong>Fix channel-aware update checks:</strong> Updater now checks the correct feed URL for stable/beta/nightly channels. (#345)' },

          { type: 'p', text: '<strong>Fix controller symlink crash:</strong> Filter out node_modules/.bin symlinks during runtime plugin copy to prevent EINVAL on skill import. (#355)' },

          { type: 'p', text: '<strong>Markdown 聊天渲染：</strong>会话聊天气泡支持渲染格式化内容——列表、链接、代码块。（#348）' },
          { type: 'p', text: '<strong>动态运行时端口：</strong>桌面运行时动态分配端口，消除启动时的固定端口冲突。（#331）' },
          { type: 'p', text: '<strong>关于对话框 & 更新菜单：</strong>新增应用关于对话框和应用内更新检查。（#345）' },
          { type: 'p', text: '<strong>工作区 & 运行时分析：</strong>新增工作区和运行时生命周期追踪分析事件。（#411）' },
          { type: 'h2', text: '🐛 Bug 修复' },
          { type: 'p', text: '<strong>修复飞书重启死循环：</strong>配置写入器跳过冗余写入，打破 restart → syncAll → write → watcher 循环，该循环导致飞书渠道不可用。（#347）' },
          { type: 'p', text: '<strong>修复退出后僵尸进程：</strong>应用退出时等待子进程清理，3 秒后升级为 SIGKILL，防止孤儿进程阻止应用删除。（#346）' },
          { type: 'p', text: '<strong>修复冷启动配置重载：</strong>配置写入器从磁盘种子缓存，避免每次控制器重启后不必要的 OpenClaw 重载。（#349）' },
          { type: 'p', text: '<strong>修复渠道感知更新检查：</strong>更新器现在检查 stable/beta/nightly 渠道对应的正确 feed URL。（#345）' },

          { type: 'p', text: '<strong>修复 Skill 卡片拖拽：</strong>阻止 Skill 卡片上的拖拽事件打开第二个浏览器窗口。（#361）' },
          { type: 'p', text: '<strong>修复控制器符号链接崩溃：</strong>在运行时插件复制时过滤 node_modules/.bin 符号链接，防止 Skill 导入时 EINVAL 错误。（#355）' },

        ]

      }    ];
  </script>

  <main class="min-h-screen blog-body" style="background:#000;padding-top: 96px; padding-bottom: 96px;" x-data="{
    openArticle: null,
    activeFilter: 'All',
    filters: ['All', 'Announcements', 'Guides', 'Use Cases'],
    filterLabels: { 'All': '\u5168\u90e8', 'Announcements': '\u516c\u544a', 'Guides': '\u6307\u5357', 'Use Cases': '\u4f7f\u7528\u573a\u666f' },
    articles: window._blogArticles,
    init() {
      const hash = location.hash.slice(1);
      if (hash) { const a = this.articles.find(x => x.slug === hash); if (a) this.openArticle = a.id; }
      window.addEventListener('hashchange', () => {
        const h = location.hash.slice(1);
        if (h) { const a = this.articles.find(x => x.slug === h); if (a) { this.openArticle = a.id; window.scrollTo(0,0); } }
        else { this.openArticle = null; }
      });
    },
    t(a, key) { return lang === 'zh' && a[key+'_zh'] ? a[key+'_zh'] : a[key] },
    ts(a) { return lang === 'zh' && a.sections_zh ? a.sections_zh : a.sections },
    fl(f) { return lang === 'zh' ? (this.filterLabels[f] || f) : f },
    getCurrent() { return this.articles.find(a => a.id === this.openArticle) },
    getFiltered() { return this.activeFilter === 'All' ? this.articles : this.articles.filter(a => a.category === this.activeFilter) },
    getRelated() { const cur = this.getCurrent(); if (cur && cur.related) return cur.related.map(id => this.articles.find(a => a.id === id)).filter(Boolean); return this.articles.filter(a => a.id !== this.openArticle).slice(0, 3); }
  }">
    <div x-show="!openArticle">
      <div class="container" style="padding-left:4px;padding-right:4px;">

        <!-- Featured headline -->
        <article class="group cursor-pointer" style="margin-bottom:56px;" @click="openArticle = articles[0].id; location.hash = articles[0].slug; window.scrollTo(0,0)">
          <div :style="'aspect-ratio:21/9;border-radius:16px;overflow:hidden;margin-bottom:24px;background:' + articles[0].bg"></div>
          <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:40px;">
            <div style="flex:1;">
              <h2 class="t-24 font-medium group-hover:opacity-70 transition-opacity blog-title-card" style="margin-bottom:12px;" x-text="t(articles[0], 'title')"></h2>
              <p class="t-14 blog-desc-card" style="color:rgba(255,255,255,0.5);max-width:480px;" x-text="t(articles[0], 'desc')"></p>
            </div>
            <div style="text-align:right;white-space:nowrap;flex-shrink:0;">
              <span class="t-12" style="color:rgba(255,255,255,0.4);" x-text="t(articles[0], 'date')"></span>
              <span class="t-12" style="color:rgba(255,255,255,0.4);margin-left:16px;" x-text="t(articles[0], 'team')"></span>
            </div>
          </div>
        </article>

        <!-- Category filter tabs -->
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:40px;flex-wrap:wrap;">
          <template x-for="f in filters" :key="f">
            <button
              @click="activeFilter = f"
              class="t-14 font-medium transition-all"
              :style="activeFilter === f
                ? 'padding:8px 20px;border-radius:100px;background:rgba(255,255,255,1);color:#000;border:none;cursor:pointer;'
                : 'padding:8px 20px;border-radius:100px;background:transparent;color:rgba(255,255,255,0.5);border:1px solid rgba(255,255,255,0.15);cursor:pointer;'"
              :class="activeFilter === f ? '' : 'hover:opacity-80'"
              x-text="fl(f)"
            ></button>
          </template>
        </div>

        <!-- Filtered article cards grid -->
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:20px;">
          <template x-for="a in getFiltered()" :key="a.id">
            <article class="group flex flex-col cursor-pointer" @click="openArticle = a.id; location.hash = a.slug; window.scrollTo(0,0)">
              <div :style="'aspect-ratio:16/9;border-radius:16px;overflow:hidden;background:' + a.bg"></div>
              <div class="flex flex-col gap-3" style="padding: 12px 4px;">
                <div class="t-12" style="color:rgba(255,255,255,0.4);display:flex;align-items:center;gap:8px;">
                  <span x-text="t(a, 'label')"></span>
                  <span>&middot;</span>
                  <span x-text="t(a, 'team')"></span>
                </div>
                <h2 class="t-20 font-medium group-hover:opacity-70 transition-opacity blog-title-card" x-text="t(a, 'title')"></h2>
                <p class="t-14 blog-desc-card" style="color:rgba(255,255,255,0.5);" x-text="t(a, 'desc')"></p>
              </div>
            </article>
          </template>
        </div>

        <div x-show="getFiltered().length === 0" style="text-align:center;padding:80px 0;">
          <p class="t-16" style="color:rgba(255,255,255,0.4);" x-text="lang === 'zh' ? '\u8be5\u5206\u7c7b\u6682\u65e0\u6587\u7ae0' : 'No articles in this category yet.'"></p>
        </div>
      </div>
    </div>

    <div x-show="openArticle" x-cloak>
      <div style="max-width:860px;margin:0 auto;padding:48px 24px 96px;">
        <button @click="openArticle = null; history.pushState('', '', location.pathname); window.scrollTo(0,0)" class="t-12 transition-opacity hover:opacity-60" style="color:rgba(255,255,255,0.4);margin-bottom:48px;display:flex;align-items:center;gap:8px;background:none;border:none;cursor:pointer;padding:0;">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 3L5 8L10 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span x-text="lang === 'zh' ? '\u8fd4\u56de' : 'Back'"></span>
        </button>

        <h1 class="t-32" style="margin-bottom:20px;" x-text="getCurrent() ? t(getCurrent(), 'title') : ''"></h1>
        <div style="margin-bottom:40px;">
          <span class="t-12" style="color:rgba(255,255,255,0.4);" x-text="getCurrent() ? t(getCurrent(), 'date') : ''"></span>
          <span class="t-12" style="color:rgba(255,255,255,0.4);margin-left:16px;" x-text="getCurrent() ? t(getCurrent(), 'team') : ''"></span>
        </div>

        <div :style="'aspect-ratio:16/9;width:100%;border-radius:16px;overflow:hidden;margin-bottom:48px;background:' + (getCurrent() ? getCurrent().bg : '')"></div>

        <div style="display:flex;flex-direction:column;gap:24px;">
          <template x-if="getCurrent()">
            <div>
              <template x-for="(block, idx) in ts(getCurrent())" :key="idx">
                <div>
                  <h2 x-show="block.type === 'h2'" class="t-20" style="margin-top:20px;margin-bottom:4px;" x-text="block.text"></h2>
                  <p x-show="block.type === 'p'" class="t-16" style="color:rgba(255,255,255,0.7);margin-bottom:20px;" x-html="block.text"></p>
                  <img x-show="block.type === 'img'" :src="block.src" :alt="block.alt || ''" style="width:100%;border-radius:12px;margin-bottom:24px;display:block;" loading="lazy">
                </div>
            </template>
            </div>
          </template>
        </div>

        <div style="margin-top:80px;padding-top:40px;border-top:1px solid rgba(255,255,255,0.1);">
          <div class="t-12" style="color:rgba(255,255,255,0.4);margin-bottom:24px;" x-text="lang === 'zh' ? '\u66f4\u591a\u6765\u81ea NEXU' : 'MORE FROM NEXU'"></div>
          <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;">
            <template x-for="a in getRelated()" :key="a.id">
              <div class="group cursor-pointer" @click="openArticle = a.id; location.hash = a.slug; window.scrollTo(0,0)">
                <div :style="'aspect-ratio:16/9;border-radius:10px;overflow:hidden;margin-bottom:12px;background:' + a.bg"></div>
                <p class="t-14 font-medium group-hover:opacity-70 transition-opacity" x-text="t(a, 'title')"></p>
              </div>
            </template>
          </div>
        </div>
      </div>
    </div>
  </main>

</body>
</html>
